name: 🚀 Daily Web3 & AI News Aggregator

on:
  schedule:
    # 每天 UTC 01:00 执行 (UTC+8 时区的早上 9:00)
    # 修改这个 cron 表达式来改变执行时间
    # 格式: 分钟 小时 日期 月份 周几 (所有时间都是 UTC)
    - cron: '0 1 * * *'
  
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 克隆仓库
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests
      
      - name: 🔄 运行新闻聚合器
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python news_aggregator.py
      
      - name: 📝 记录执行时间
        if: always()
        run: |
          echo "⏱️ 执行时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
      
      - name: 📧 执行失败通知
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python << 'EOF'
          import requests
          import os
          from datetime import datetime
          
          bot_token = os.getenv("TELEGRAM_BOT_TOKEN")
          chat_id = os.getenv("TELEGRAM_CHAT_ID")
          
          current_time = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          
          message = f"""
<b>❌ Web3 & AI 新闻聚合失败</b>

⏰ 失败时间: {current_time}

📋 问题诊断:
1. 检查 GitHub Actions 日志: 
   仓库 → Actions → 查看最新执行
2. 验证 API Keys 是否正确
3. 确保网络连接正常

🔧 常见原因:
- API Key 过期或无效
- Telegram 配置错误
- 网络连接问题
- Claude API 配额用尽

请检查后重试。
          """
          
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML"
          }
          
          try:
              response = requests.post(url, json=payload, timeout=10)
              if response.json().get('ok'):
                  print("✅ 错误通知已发送")
              else:
                  print("❌ 通知发送失败")
          except Exception as e:
              print(f"❌ 通知错误: {str(e)}")
          EOF
