name: 🚀 Daily Web3 & AI News Aggregator

on:
  schedule:
    - cron: '0 1 * * *'
  
  workflow_dispatch:

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests
      
      - name: 🔄 Run news aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python news_aggregator.py
      
      - name: 📝 Record execution time
        if: always()
        run: |
          echo "Execution time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
      
      - name: 📧 Send failure notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import requests
          import os
          from datetime import datetime
          
          bot_token = os.getenv("TELEGRAM_BOT_TOKEN")
          chat_id = os.getenv("TELEGRAM_CHAT_ID")
          current_time = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          
          message = f"❌ Web3 & AI news aggregation failed at {current_time}. Please check GitHub Actions logs."
          
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML"
          }
          
          try:
              response = requests.post(url, json=payload, timeout=10)
              if response.json().get('ok'):
                  print("Error notification sent")
          except Exception as e:
              print(f"Failed to send notification: {str(e)}")
          EOF
